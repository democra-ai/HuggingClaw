<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- OpenClaw Engine (red): 60–500, center 280 -->
  <rect x="60" y="12" width="440" height="52" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="280" y="38" text-anchor="middle" fill="#b91c1c" font-size="15" font-weight="700">OpenClaw Engine</text>
  <text x="280" y="54" text-anchor="middle" fill="#991b1b" font-size="10">Agent · Conversations · Plugins · Memory · Node.js</text>

  <!-- Arrows: left = amber (match HF Dataset), right = blue (match DNS Resolver) -->
  <line x1="165" y1="64" x2="165" y2="92" stroke="#d97706" stroke-width="1.8" marker-end="url(#arrowAmber)"/>
  <line x1="395" y1="64" x2="395" y2="92" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrowBlue)"/>

  <!-- HF Dataset (amber): wider 210px -->
  <rect x="60" y="92" width="210" height="68" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="165" y="114" text-anchor="middle" fill="#b45309" font-size="13" font-weight="700">HF Dataset</text>
  <text x="165" y="130" text-anchor="middle" fill="#92400e" font-size="10">Private repo · Conversations &amp; settings</text>
  <text x="165" y="146" text-anchor="middle" fill="#78350f" font-size="9">sync_hf.py · Auto-Sync</text>

  <!-- DNS Resolver (blue): wider 210px -->
  <rect x="290" y="92" width="210" height="68" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="395" y="114" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="700">DNS Resolver</text>
  <text x="395" y="130" text-anchor="middle" fill="#1e40af" font-size="10">Async DNS · HF Spaces fix</text>
  <text x="395" y="146" text-anchor="middle" fill="#1e3a8a" font-size="9">dns-resolve.py</text>
</svg>
