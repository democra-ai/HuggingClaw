<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" font-family="'SF Pro Display','SF Pro','Helvetica Neue',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="titleBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3c"/>
      <stop offset="100%" stop-color="#2c2c2e"/>
    </linearGradient>
    <linearGradient id="winBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#161618"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef0011"/>
      <stop offset="100%" stop-color="#ba000d"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#30d158"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64d2ff"/>
    </marker>
  </defs>

  <!-- ══ macOS Window ══ -->
  <g filter="url(#shadow)">
    <rect x="20" y="20" width="640" height="340" rx="12" fill="url(#winBg)"/>
  </g>
  <!-- Window border -->
  <rect x="20" y="20" width="640" height="340" rx="12" fill="none" stroke="#3a3a3c" stroke-width="0.5"/>

  <!-- Title bar -->
  <rect x="20" y="20" width="640" height="36" rx="12" fill="url(#titleBar)"/>
  <rect x="20" y="44" width="640" height="12" fill="url(#titleBar)"/>
  <!-- Traffic lights -->
  <circle cx="44" cy="38" r="6" fill="#ff5f57"/>
  <circle cx="64" cy="38" r="6" fill="#febc2e"/>
  <circle cx="84" cy="38" r="6" fill="#28c840"/>
  <!-- Window title -->
  <text x="340" y="43" text-anchor="middle" fill="#98989d" font-size="13" font-weight="500">HuggingClaw — HuggingFace Space</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- OpenClaw Engine                                        -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <rect x="50" y="76" width="580" height="120" rx="10" fill="#1a0505" stroke="#ef0011" stroke-width="1.2" opacity="0.95"/>
  <rect x="60" y="76" width="560" height="2.5" rx="1.2" fill="url(#redGrad)" opacity="0.6"/>

  <!-- Engine title -->
  <text x="340" y="106" text-anchor="middle" fill="#ef0011" font-size="18" font-weight="700">OpenClaw Engine</text>
  <text x="340" y="124" text-anchor="middle" fill="#6b2020" font-size="10">AI Assistant Platform · Node.js</text>

  <!-- Feature pills -->
  <rect x="68" y="140" width="108" height="30" rx="15" fill="url(#redGrad)" opacity="0.2" stroke="#ef0011" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="122" y="159" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">Agent Workflows</text>

  <rect x="188" y="140" width="108" height="30" rx="15" fill="url(#redGrad)" opacity="0.2" stroke="#ef0011" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="242" y="159" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">Conversations</text>

  <rect x="308" y="140" width="108" height="30" rx="15" fill="url(#redGrad)" opacity="0.2" stroke="#ef0011" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="362" y="159" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">Plugin System</text>

  <rect x="428" y="140" width="90" height="30" rx="15" fill="url(#redGrad)" opacity="0.2" stroke="#ef0011" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="473" y="159" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">Memory</text>

  <rect x="530" y="140" width="86" height="30" rx="15" fill="url(#redGrad)" opacity="0.12"/>
  <text x="573" y="159" text-anchor="middle" fill="#7f1d1d" font-size="10">40+ more</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Arrows down                                            -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <line x1="220" y1="200" x2="220" y2="238" stroke="#30d158" stroke-width="2" marker-end="url(#arrowGreen)" filter="url(#glow)"/>
  <line x1="460" y1="200" x2="460" y2="238" stroke="#64d2ff" stroke-width="2" marker-end="url(#arrowBlue)" filter="url(#glow)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- HF Dataset (left)                                      -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <rect x="50" y="244" width="270" height="90" rx="10" fill="#1a1a0a" stroke="#fbbf24" stroke-width="1.2"/>
  <!-- HF icon -->
  <circle cx="78" cy="268" r="12" fill="#fbbf24" opacity="0.12"/>
  <text x="78" y="272" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">HF</text>
  <text x="100" y="272" fill="#fbbf24" font-size="14" font-weight="700">Dataset</text>
  <text x="100" y="289" fill="#7a6520" font-size="10">Private Repo · Persistent Backup</text>
  <!-- Sync badge -->
  <rect x="100" y="300" width="80" height="22" rx="11" fill="#0a2618" stroke="#30d158" stroke-width="0.8"/>
  <text x="140" y="315" text-anchor="middle" fill="#30d158" font-size="9" font-weight="600">Auto-Sync</text>
  <text x="200" y="315" fill="#5c4a10" font-size="9">Conversations · Settings</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- DNS Resolver (right)                                   -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <rect x="360" y="244" width="270" height="90" rx="10" fill="#0a1520" stroke="#64d2ff" stroke-width="1.2"/>
  <!-- DNS icon -->
  <circle cx="388" cy="268" r="12" fill="#64d2ff" opacity="0.12"/>
  <text x="388" y="273" text-anchor="middle" fill="#64d2ff" font-size="10" font-weight="700">DNS</text>
  <text x="410" y="272" fill="#64d2ff" font-size="14" font-weight="700">Resolver</text>
  <text x="410" y="289" fill="#2a5a7a" font-size="10">Async DNS · Background Worker</text>
  <!-- Script badge -->
  <rect x="410" y="300" width="96" height="22" rx="11" fill="#0a1828" stroke="#64d2ff" stroke-width="0.8"/>
  <text x="458" y="315" text-anchor="middle" fill="#64d2ff" font-size="9" font-weight="600">dns-resolve.py</text>
  <text x="524" y="315" fill="#1a3a5a" font-size="9">HF Spaces Fix</text>
</svg>
